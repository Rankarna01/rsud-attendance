<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Home - Mobile PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Plus Jakarta Sans', sans-serif;" class="bg-slate-50">
    <div class="min-h-screen bg-slate-50 flex flex-col font-sans max-w-md mx-auto shadow-2xl relative">
        <div class="flex-1 overflow-y-auto pb-24 hide-scrollbar">
            <!-- Header section -->
            <div class="bg-white px-6 py-6 pb-8 rounded-b-[40px] shadow-sm relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-slate-500 text-sm font-medium">Good Morning,</p>
                        <h1 class="text-2xl font-bold text-slate-900">Employee</h1>
                    </div>
                    <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center border-2 border-slate-50 shadow-sm font-bold text-slate-500">E</div>
                </div>

                <!-- Date & Time -->
                <div class="flex flex-col items-center justify-center my-6">
                    <p class="text-slate-500 font-medium">Monday, January 8, 2024</p>
                    <div class="text-5xl font-black text-slate-900 mt-2 tracking-tighter tabular-nums">
                        08:45
                    </div>
                </div>
            </div>

            <div class="px-6 -mt-6 relative z-20 space-y-4">
                <!-- Attendance Status Card -->
                <div class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-3xl p-6 text-white shadow-xl shadow-slate-900/20 border-4 border-slate-50">
                    <div class="flex items-center gap-2 text-amber-400 text-sm font-semibold mb-4">
                        🕐 Today's Attendance
                    </div>
                    
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-slate-400 text-xs mb-1">Check In</p>
                            <p class="text-xl font-bold">08:45 <span class="text-sm font-normal text-slate-400">AM</span></p>
                        </div>
                        <div class="w-px h-10 bg-slate-700"></div>
                        <div>
                            <p class="text-slate-400 text-xs mb-1">Check Out</p>
                            <p class="text-xl font-bold text-slate-500">--:--</p>
                        </div>
                    </div>

                    <div class="mt-6 bg-white/10 rounded-2xl p-3 flex items-center justify-center gap-2 backdrop-blur-md border border-white/5">
                        <span class="text-emerald-400 text-sm">✓</span>
                        <span class="text-sm font-medium">You are marked as Present</span>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <a href="leave.html" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
                        <div class="w-12 h-12 rounded-full bg-amber-50 text-amber-500 flex items-center justify-center mb-1 text-xl">⏱️</div>
                        <span class="text-sm font-semibold text-slate-700">Request Leave</span>
                    </a>
                    <a href="history.html" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
                        <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mb-1 text-xl">📍</div>
                        <span class="text-sm font-semibold text-slate-700">View History</span>
                    </a>
                </div>

                <!-- Recent Activity Mini -->
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-slate-900">Recent Activity</h3>
                        <a href="history.html" class="text-xs font-semibold text-amber-600 flex items-center">View All →</a>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg">✓</div>
                            <div class="flex-1">
                                <p class="text-sm font-semibold text-slate-900">Checked In</p>
                                <p class="text-xs text-slate-500">Today at 08:45 AM</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 rounded-t-3xl pb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] z-50">
            <div class="flex justify-around items-center h-16 px-2 relative">
                <a href="home.html" class="flex flex-col items-center justify-center w-16 gap-1 text-amber-600">
                    <span class="text-xl">🏠</span>
                    <span class="text-[10px] font-medium">Home</span>
                </a>

                <a href="history.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">📜</span>
                    <span class="text-[10px] font-medium">History</span>
                </a>

                <div class="w-16 flex justify-center">
                    <a href="attendance.html" class="absolute -top-6 flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-amber-500 to-yellow-400 rounded-full shadow-lg shadow-amber-500/30 border-4 border-slate-50 text-white transform hover:scale-105 transition-all active:scale-95 z-50 text-2xl">
                        📷
                    </a>
                </div>

                <a href="leave.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">📋</span>
                    <span class="text-[10px] font-medium">Leave</span>
                </a>

                <a href="profile.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">👤</span>
                    <span class="text-[10px] font-medium">Profile</span>
                </a>
            </div>
        </nav>
    </div>
</body>
</html>
