<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Login - Mobile PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Plus Jakarta Sans', sans-serif;" class="bg-slate-50">
    <div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 relative overflow-hidden max-w-md mx-auto">
        <!-- Decorative backgrounds -->
        <div class="absolute top-0 left-0 w-full h-96 bg-amber-400/10 rounded-b-[100px] -z-10 blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-amber-400/10 rounded-full -z-10 blur-3xl"></div>

        <div class="w-full max-w-md p-8 rounded-3xl shadow-xl shadow-black/5 border-0 bg-white/80 backdrop-blur-xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-amber-400 to-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-amber-500/20">
                    🔐
                </div>
                <h1 class="text-2xl font-bold text-slate-900 mb-2">Welcome Back</h1>
                <p class="text-slate-500 text-sm">Online GPS Attendance System</p>
            </div>

            <form class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-3 text-slate-400">✉️</span>
                        <input type="email" value="user@example.com" class="w-full pl-10 h-12 rounded-xl bg-slate-50/50 border border-slate-200 focus:bg-white transition-colors focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-3 text-slate-400">🔒</span>
                        <input type="password" value="password" class="w-full pl-10 h-12 rounded-xl bg-slate-50/50 border border-slate-200 focus:bg-white transition-colors focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="button" onclick="window.location.href='home.html'" class="w-full h-12 rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-semibold shadow-lg shadow-slate-900/20 transition-all active:scale-[0.98]">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-8 space-y-4">
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                    <p class="text-xs font-semibold text-amber-900 mb-3 uppercase tracking-wider">Demo Accounts:</p>
                    <div class="space-y-2 text-xs text-amber-800">
                        <div>
                            <p class="font-semibold">👨‍💼 Admin Dashboard</p>
                            <p class="text-amber-700">admin@example.com / password</p>
                        </div>
                        <div class="border-t border-amber-200 pt-2">
                            <p class="font-semibold">📱 Employee Mobile</p>
                            <p class="text-amber-700">user@example.com / password</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
