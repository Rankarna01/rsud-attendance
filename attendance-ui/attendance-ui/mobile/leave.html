<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Leave Request - Mobile PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Plus Jakarta Sans', sans-serif;" class="bg-slate-50">
    <div class="min-h-screen bg-slate-50 flex flex-col max-w-md mx-auto">
        <div class="flex-1 overflow-y-auto pb-24 hide-scrollbar">
            <div class="p-6 pt-10">
                <h1 class="text-2xl font-bold text-slate-900 mb-2">Request Leave</h1>
                <p class="text-slate-500 text-sm mb-6">Submit absence or annual leave request.</p>

                <div class="bg-white rounded-3xl border-0 shadow-sm p-6 mb-8">
                    <form class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider ml-1">Leave Type</label>
                            <div class="grid grid-cols-2 gap-3">
                                <button type="button" class="py-3 rounded-2xl text-sm font-semibold transition-all border-2 border-amber-600 bg-amber-50 text-amber-700">
                                    Annual
                                </button>
                                <button type="button" class="py-3 rounded-2xl text-sm font-semibold transition-all border-2 border-slate-100 bg-white text-slate-500">
                                    Sick Leave
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider ml-1">Start Date</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📅</span>
                                    <input type="date" class="w-full pl-9 rounded-xl h-12 bg-slate-50 border-transparent focus:bg-white focus:outline-none focus:ring-2 focus:ring-amber-600">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider ml-1">End Date</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">📅</span>
                                    <input type="date" class="w-full pl-9 rounded-xl h-12 bg-slate-50 border-transparent focus:bg-white focus:outline-none focus:ring-2 focus:ring-amber-600">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider ml-1">Reason</label>
                            <textarea class="w-full rounded-2xl bg-slate-50 border-transparent focus:bg-white focus:ring-2 focus:ring-amber-600 focus:border-transparent p-4 text-sm min-h-[100px] resize-none outline-none transition-all" placeholder="Enter details here..."></textarea>
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider ml-1">Attachment (Optional)</label>
                            <div class="border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center text-slate-400 bg-slate-50/50">
                                <span class="text-2xl mb-2">📤</span>
                                <span class="text-xs font-medium">Upload Document / Photo</span>
                            </div>
                        </div>

                        <button type="submit" class="w-full h-14 rounded-2xl bg-slate-900 text-white font-semibold text-base shadow-lg shadow-slate-900/20 active:scale-[0.98] transition">
                            Submit Request
                        </button>
                    </form>
                </div>

                <!-- Recent Requests Summary -->
                <h2 class="font-bold text-slate-900 mb-4 px-1">Recent Requests</h2>
                <div class="space-y-3 pb-8">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="font-semibold text-sm text-slate-900">Sick Leave</p>
                            <p class="text-[10px] text-slate-500 mt-1">2024-01-10 to 2024-01-12</p>
                        </div>
                        <span class="px-3 py-1 text-[10px] font-semibold bg-emerald-50 text-emerald-600 rounded">Approved</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 rounded-t-3xl pb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] z-50">
            <div class="flex justify-around items-center h-16 px-2 relative">
                <a href="home.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">🏠</span>
                    <span class="text-[10px] font-medium">Home</span>
                </a>

                <a href="history.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">📜</span>
                    <span class="text-[10px] font-medium">History</span>
                </a>

                <div class="w-16 flex justify-center">
                    <a href="attendance.html" class="absolute -top-6 flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-amber-500 to-yellow-400 rounded-full shadow-lg shadow-amber-500/30 border-4 border-slate-50 text-white transform hover:scale-105 transition-all active:scale-95 z-50 text-2xl">
                        📷
                    </a>
                </div>

                <a href="leave.html" class="flex flex-col items-center justify-center w-16 gap-1 text-amber-600">
                    <span class="text-xl">📋</span>
                    <span class="text-[10px] font-medium">Leave</span>
                </a>

                <a href="profile.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">👤</span>
                    <span class="text-[10px] font-medium">Profile</span>
                </a>
            </div>
        </nav>
    </div>
</body>
</html>
