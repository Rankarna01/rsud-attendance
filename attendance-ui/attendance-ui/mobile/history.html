<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>History - Mobile PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Plus Jakarta Sans', sans-serif;" class="bg-slate-50">
    <div class="min-h-screen bg-slate-50 flex flex-col max-w-md mx-auto">
        <div class="flex-1 overflow-y-auto pb-24 hide-scrollbar">
            <div class="p-6 pt-10">
                <h1 class="text-2xl font-bold text-slate-900 mb-2">Attendance History</h1>
                <p class="text-slate-500 text-sm mb-8">View your past check-in records.</p>

                <div class="space-y-4">
                    <div class="bg-white rounded-3xl border-0 shadow-sm p-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600 text-lg">
                                    📅
                                </div>
                                <div>
                                    <p class="font-semibold text-slate-900 text-sm">Mon, 08 Jan 2024</p>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">
                                        On Time
                                    </p>
                                </div>
                            </div>
                            <div class="text-emerald-500 text-xl">✓</div>
                        </div>
                        
                        <div class="bg-slate-50 rounded-2xl p-3 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="text-emerald-500 text-lg">🕐</span>
                                <span class="text-xs font-medium text-slate-700">IN: 08:45</span>
                            </div>
                            <div class="w-px h-4 bg-slate-200"></div>
                            <div class="flex items-center gap-2">
                                <span class="text-amber-500 text-lg">🕐</span>
                                <span class="text-xs font-medium text-slate-700">OUT: 17:15</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl border-0 shadow-sm p-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600 text-lg">
                                    📅
                                </div>
                                <div>
                                    <p class="font-semibold text-slate-900 text-sm">Sun, 07 Jan 2024</p>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">
                                        Status: Sick
                                    </p>
                                </div>
                            </div>
                            <div class="text-amber-500 text-xl">S</div>
                        </div>
                        
                        <div class="bg-slate-50 rounded-2xl p-3 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="text-emerald-500 text-lg">🕐</span>
                                <span class="text-xs font-medium text-slate-700">IN: --:--</span>
                            </div>
                            <div class="w-px h-4 bg-slate-200"></div>
                            <div class="flex items-center gap-2">
                                <span class="text-amber-500 text-lg">🕐</span>
                                <span class="text-xs font-medium text-slate-700">OUT: --:--</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl border-0 shadow-sm p-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600 text-lg">
                                    📅
                                </div>
                                <div>
                                    <p class="font-semibold text-slate-900 text-sm">Sat, 06 Jan 2024</p>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">
                                        On Time
                                    </p>
                                </div>
                            </div>
                            <div class="text-emerald-500 text-xl">✓</div>
                        </div>
                        
                        <div class="bg-slate-50 rounded-2xl p-3 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="text-emerald-500 text-lg">🕐</span>
                                <span class="text-xs font-medium text-slate-700">IN: 08:30</span>
                            </div>
                            <div class="w-px h-4 bg-slate-200"></div>
                            <div class="flex items-center gap-2">
                                <span class="text-amber-500 text-lg">🕐</span>
                                <span class="text-xs font-medium text-slate-700">OUT: 17:00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 rounded-t-3xl pb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] z-50">
            <div class="flex justify-around items-center h-16 px-2 relative">
                <a href="home.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">🏠</span>
                    <span class="text-[10px] font-medium">Home</span>
                </a>

                <a href="history.html" class="flex flex-col items-center justify-center w-16 gap-1 text-amber-600">
                    <span class="text-xl">📜</span>
                    <span class="text-[10px] font-medium">History</span>
                </a>

                <div class="w-16 flex justify-center">
                    <a href="attendance.html" class="absolute -top-6 flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-amber-500 to-yellow-400 rounded-full shadow-lg shadow-amber-500/30 border-4 border-slate-50 text-white transform hover:scale-105 transition-all active:scale-95 z-50 text-2xl">
                        📷
                    </a>
                </div>

                <a href="leave.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">📋</span>
                    <span class="text-[10px] font-medium">Leave</span>
                </a>

                <a href="profile.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">👤</span>
                    <span class="text-[10px] font-medium">Profile</span>
                </a>
            </div>
        </nav>
    </div>
</body>
</html>
