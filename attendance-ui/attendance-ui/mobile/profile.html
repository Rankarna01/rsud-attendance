<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Profile - Mobile PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Plus Jakarta Sans', sans-serif;" class="bg-slate-50">
    <div class="min-h-screen bg-slate-50 relative pb-10 flex flex-col max-w-md mx-auto">
        <!-- Decorative header -->
        <div class="absolute top-0 left-0 w-full h-48 bg-slate-900 rounded-b-[40px] z-0"></div>

        <div class="flex-1 overflow-y-auto pb-24 relative z-10 px-6 pt-16">
            <h1 class="text-white text-2xl font-bold mb-8 text-center">My Profile</h1>

            <div class="bg-white rounded-[2rem] border-0 shadow-xl shadow-black/5 p-6 mb-6 text-center mt-8">
                <div class="w-24 h-24 rounded-full bg-slate-100 border-4 border-white shadow-lg mx-auto -mt-16 mb-4 flex items-center justify-center text-3xl font-bold text-slate-400">
                    E
                </div>
                <h2 class="text-xl font-bold text-slate-900">Employee Name</h2>
                <p class="text-sm font-medium text-amber-600 mt-1">Staff Member</p>
                
                <div class="flex justify-center mt-6">
                    <button class="border border-slate-200 text-slate-700 py-2 px-6 rounded-xl font-semibold h-10 bg-white hover:bg-slate-50">
                        Edit Profile
                    </button>
                </div>
            </div>

            <h3 class="font-bold text-slate-900 px-2 mb-3">Account Details</h3>
            <div class="bg-white rounded-3xl border-0 shadow-sm overflow-hidden mb-6">
                <div class="divide-y divide-slate-50">
                    <div class="flex items-center gap-4 p-4 hover:bg-slate-50 transition-colors">
                        <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg">👤</div>
                        <div class="flex-1">
                            <p class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">Full Name</p>
                            <p class="text-sm font-semibold text-slate-900">John Doe</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 p-4 hover:bg-slate-50 transition-colors">
                        <div class="w-10 h-10 rounded-full bg-amber-50 text-amber-500 flex items-center justify-center text-lg">#️⃣</div>
                        <div class="flex-1">
                            <p class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">NIP (Employee ID)</p>
                            <p class="text-sm font-semibold text-slate-900">2024001</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 p-4 hover:bg-slate-50 transition-colors">
                        <div class="w-10 h-10 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg">✉️</div>
                        <div class="flex-1">
                            <p class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">Email Address</p>
                            <p class="text-sm font-semibold text-slate-900">user@example.com</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 p-4 hover:bg-slate-50 transition-colors">
                        <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg">📱</div>
                        <div class="flex-1">
                            <p class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5">Phone Number</p>
                            <p class="text-sm font-semibold text-slate-900">08123456789</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <button class="w-full bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100 active:bg-slate-50">
                    <div class="flex items-center gap-3 font-semibold text-sm text-slate-700">
                        <span class="text-lg">⚙️</span> Settings & Privacy
                    </div>
                    <span class="text-slate-400">→</span>
                </button>
                
                <a href="login.html" class="w-full bg-red-50 p-4 rounded-2xl flex items-center justify-between border border-red-100 active:bg-red-100 transition-colors mt-8 font-bold text-sm text-red-600">
                    <div class="flex items-center gap-3">
                        <span class="text-lg">🚪</span> Sign Out
                    </div>
                </a>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 rounded-t-3xl pb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] z-50">
            <div class="flex justify-around items-center h-16 px-2 relative">
                <a href="home.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">🏠</span>
                    <span class="text-[10px] font-medium">Home</span>
                </a>

                <a href="history.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">📜</span>
                    <span class="text-[10px] font-medium">History</span>
                </a>

                <div class="w-16 flex justify-center">
                    <a href="attendance.html" class="absolute -top-6 flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-amber-500 to-yellow-400 rounded-full shadow-lg shadow-amber-500/30 border-4 border-slate-50 text-white transform hover:scale-105 transition-all active:scale-95 z-50 text-2xl">
                        📷
                    </a>
                </div>

                <a href="leave.html" class="flex flex-col items-center justify-center w-16 gap-1 text-slate-400 hover:text-slate-600">
                    <span class="text-xl">📋</span>
                    <span class="text-[10px] font-medium">Leave</span>
                </a>

                <a href="profile.html" class="flex flex-col items-center justify-center w-16 gap-1 text-amber-600">
                    <span class="text-xl">👤</span>
                    <span class="text-[10px] font-medium">Profile</span>
                </a>
            </div>
        </nav>
    </div>
</body>
</html>
